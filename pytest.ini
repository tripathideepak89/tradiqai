[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# asyncio mode for pytest-asyncio
asyncio_mode = auto

# Markers
markers =
    unit: Pure unit tests — no I/O, no external calls
    integration: Tests that hit FastAPI TestClient (SQLite in-memory DB)
    e2e: Full end-to-end flow tests
    smoke: Quick sanity checks (subset of integration)
    slow: Tests that take >5 seconds (e.g. Monte Carlo)
    business: Business rule and scenario validation tests (deterministic, no HTTP)

# Default options
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Coverage (run with: pytest --cov)
# [coverage:run]
# source = .
# omit = .venv/*,tests/*,migrations/*
