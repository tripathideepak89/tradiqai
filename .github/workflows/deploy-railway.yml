name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚀 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_auth.txt
          pip install -r requirements_supabase.txt
      
      - name: 🧪 Run Tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SUPABASE_URL: "https://fake.supabase.co"
          SUPABASE_ANON_KEY: "fake-anon-key"
          SUPABASE_SERVICE_KEY: "fake-service-key"
          ENV: "test"
          REDIS_URL: "redis://localhost:6379/15"
        run: |
          pip install pytest pytest-asyncio pytest-cov
          # Run unit + integration tests (skip slow Monte Carlo in CI)
          pytest tests/ -v \
            --tb=short \
            -m "not slow" \
            --cov=. \
            --cov-omit=".venv/*,tests/*,migrations/*" \
            --cov-report=term-missing:skip-covered \
            -q
        continue-on-error: false
      
      - name: 🚂 Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: autotrade-dashboard
        env:
          # These will be set in Railway dashboard
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      
      - name: ✅ Deployment Complete
        run: |
          echo "🎉 Deployment to Railway completed successfully!"
          echo "🌐 Your dashboard should be available at your Railway domain"
